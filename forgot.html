/* ===================== Design tokens ===================== */
:root {
  --navy: #002b45;
  --blue: #4d6aff;
  --blue-hover: #3a57e8;
  --light-blue: #d6e9fb;
  --border: #bcc1c7;
  --text: #4a5560;
  --muted: #8a929b;
  --success: #1d8a4c;
  --error: #be1100;
  --error-bg: #fdecea;
  --surface: #ffffff;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  font-family: 'DFDS Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  color: var(--navy);
  background: var(--surface);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-size: 15px;
  line-height: 1.5;
}

/* ===================== Two-column shell ===================== */
.dfds-wrapper {
  display: flex;
  min-height: 100vh;
  width: 100%;
}

.dfds-left {
  flex: 1 1 50%;
  display: flex;
  flex-direction: column;
  padding: 64px clamp(24px, 6vw, 80px);
  overflow-y: auto;
}

.dfds-right {
  flex: 1 1 50%;
  position: relative;

/* ===================== B2C container ===================== */
#api {
  width: 100%;
  max-width: 520px;
}

/* ===================== Heading + back arrow ===================== */
.heading {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
}
.heading::before {
  content: "";
  flex: 0 0 40px;
  width: 40px;
  height: 40px;
  border: 1px solid var(--navy);
  border-radius: 4px;
  background-image: url("data:image/svg+xml,%3Csvg%20width%3D%2220%22%20height%3D%2220%22%20viewBox%3D%220%200%2020%2020%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%20%3Cpath%20fill-rule%3D%22evenodd%22%20clip-rule%3D%22evenodd%22%20d%3D%22M6.78321%209.16628L9.99984%206.18037L8.86065%204.97804L4.25574%209.16628H4.1665V9.24744L3.33317%2010.0054L4.1665%2010.7772V10.8329H4.22663L8.73128%2015.0054L9.89866%2013.7535L6.76674%2010.8329H16.6665V9.16628H6.78321Z%22%20fill%3D%22%23002B45%22%2F%3E%20%3C%2Fsvg%3E");
  background-repeat: no-repeat;
  background-position: center;
  background-size: 20px 20px;
}
.heading h1 {
  margin: 0;
  font-size: 28px;
  font-weight: 800;
  line-height: 1.2;
  color: var(--navy);
}

/* ===================== Intro / subtext ===================== */
.intro {
  margin: 0 0 28px;
}
.intro h2,
.intro p {
  margin: 0;
  font-size: 15px;
  font-weight: 400;
  line-height: 1.45;
  color: var(--text);
}

/* ===================== Form fields ===================== */
.entry {
  display: flex;
  flex-direction: column;
}
.entry-item {
  margin-bottom: 20px;
}
.entry-item label,
.attrEntry label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: var(--navy);
  margin-bottom: 8px;
}

input[type="email"],
input[type="text"],
input[type="tel"],
input[type="number"],
input[type="password"],
input.textInput {
  width: 100%;
  height: 48px;
  padding: 0 14px;
  font-family: inherit;
  font-size: 15px;
  color: var(--navy);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  outline: none;
  transition: border-color .15s ease, box-shadow .15s ease;
}
input:hover {
  border-color: #98a0a8;
}
input:focus {
  border-color: var(--navy);
  box-shadow: 0 0 0 1px var(--navy);
}
input::placeholder {
  color: transparent;
}

/* Password field eye (no-JS CSS fallback; JS swaps it for a real button) */
input[type="password"] {
  background-image: url("data:image/svg+xml,%3Csvg%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2016%2016%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%20%3Cpath%20d%3D%22M7.99984%203.3335C3.94975%203.3335%200.666504%208.00016%200.666504%208.00016C0.666504%208.00016%203.94975%2012.6668%207.99984%2012.6668C12.0499%2012.6668%2015.3332%208.00016%2015.3332%208.00016C15.3332%208.00016%2012.0499%203.3335%207.99984%203.3335ZM7.99984%2010.6668C6.52706%2010.6668%205.33317%209.4729%205.33317%208.00016C5.33317%206.52738%206.52706%205.3335%207.99984%205.3335C9.47262%205.3335%2010.6665%206.52738%2010.6665%208.00016C10.6665%209.4729%209.47262%2010.6668%207.99984%2010.6668ZM9.33317%208.00016C9.33317%208.73653%208.73621%209.3335%207.99984%209.3335C7.26347%209.3335%206.6665%208.73653%206.6665%208.00016C6.6665%207.26375%207.26347%206.66683%207.99984%206.66683C8.73621%206.66683%209.33317%207.26375%209.33317%208.00016Z%22%20fill%3D%22%233C4953%22%2F%3E%20%3C%2Fsvg%3E");
  background-repeat: no-repeat;
  background-position: right 14px center;
  padding-right: 44px;
}

/* Show / hide password toggle (added by JavaScript) */
.dfds-pwd-wrap {
  position: relative;
}
.dfds-pwd-toggle {
  position: absolute;
  top: 0;
  right: 0;
  height: 48px;
  width: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  margin: 0;
  border: none;
  background: transparent;
  color: #3c4953;
  cursor: pointer;
}
.dfds-pwd-toggle svg {
  width: 16px;
  height: 16px;
  display: block;
  pointer-events: none;
}
.dfds-pwd-toggle:focus-visible {
  outline: 2px solid var(--navy);
  outline-offset: -2px;
  border-radius: 4px;
}

.password-label {
  display: block;
}
.entry-item:has(.password-label) {
  position: relative;
  padding-bottom: 34px;
}
#forgotPassword {
  position: absolute;
  left: 0;
  bottom: 0;
  font-size: 14px;
  font-weight: 500;
  color: var(--blue);
  text-decoration: none;
}
#forgotPassword:hover {
  text-decoration: underline;
}

/* ===================== Errors ===================== */
.error {
  display: none;
}
.error[aria-hidden="false"] {
  display: block;
}
.error.pageLevel {
  margin-bottom: 18px;
  padding: 12px 14px;
  background: var(--error-bg);
  border: 1px solid var(--error);
  border-radius: 4px;
}
.error.itemLevel {
  margin-top: 6px;
}
.error p {
  margin: 0;
  font-size: 13px;
  line-height: 1.4;
  color: var(--error);
}
.error p:empty {
  display: none;
}

  display: inline-block;

.error p:empty::before {
  content: none;
}
input.highlightError {
  border-color: var(--error);
  box-shadow: 0 0 0 1px var(--error);
}

/* ===================== Working / spinner ===================== */
.working {
  display: none;
}

/* ===================== Buttons ===================== */
.buttons {
  margin-top: 8px;
}

/* Primary (filled) */
button#next,
button#continue {
  width: 100%;
  height: 48px;
  border: none;
  border-radius: 4px;
  background: var(--blue);
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s ease;
}
button#next:hover,
button#continue:hover {
  background: var(--blue-hover);
}
button#next:focus-visible,
button#continue:focus-visible {
  outline: 2px solid var(--navy);
  outline-offset: 2px;
}
button#continue:disabled {
  opacity: .5;
  cursor: not-allowed;
}

/* Secondary (outlined) */
#createAccount,
button#cancel {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 48px;
  border: 1px solid var(--navy);
  border-radius: 4px;
  background: var(--surface);
  color: var(--navy);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: background .15s ease;
}
#createAccount:hover,
button#cancel:hover {
  background: #f3f6f9;
}

/* ===================== Responsive ===================== */
@media (max-width: 900px) {
  .dfds-right {
    display: none;
  }
  .dfds-left {
    flex: 1 1 100%;
    align-items: center;
    padding: 48px 24px;
  }
  #api {
    width: 100%;
    max-width: 440px;
  }
}


    /* ===================== Password-reset (SelfAsserted) specifics ===================== */

    /* B2C renders an empty <div class="buttons"> under the heading. */
    .buttons:empty {
      display: none;
    }

    /* Attribute list: strip default list styling */
    #attributeList.attr ul,
    .verificationControlContent ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    #attributeList.attr > ul > li,
    .verificationControlContent > ul > li {
      margin: 0 0 20px;
    }
    .attrEntry {
      margin-bottom: 0;
    }

    /* Verification control container */
    .verificationControlContent {
      margin-top: 4px;
    }

    /* Helper / status text inside the verification control */
    .verificationInfoText,
    .verificationInfoText div {
      font-size: 14px;
      color: var(--text);
      line-height: 1.45;
      margin-bottom: 14px;
    }
    .verificationSuccessText,
    .verificationSuccessText div {
      font-size: 14px;
      color: var(--success);
      line-height: 1.45;
    }
    .verificationSuccessText:not(:empty),
    .verificationErrorText:not(:empty) {
      margin-bottom: 14px;
    }
    .verificationErrorText,
    .verificationErrorText div {
      font-size: 14px;
      color: var(--error);
      line-height: 1.45;
    }

    /* "What is this?" help links */
    .helpLink.tiny {
      display: inline-block;
      margin-top: 6px;
      font-size: 13px;
      font-weight: 500;
      color: var(--blue);
      text-decoration: none;
    }
    .helpLink.tiny:hover {
      text-decoration: underline;
    }

    /* Verification action buttons (Send code / Verify / Send new / Change e-mail).
       B2C toggles which are visible via inline display, we only style them. */
    .verificationControlContent .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }
    .verificationControlContent .buttons button {
      width: 100%;
      height: 48px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s ease;
    }
    /* Primary verification actions */
    button.sendCode,
    button.verifyCode {
      border: none;
      background: var(--blue);
      color: #fff;
    }
    button.sendCode:hover,
    button.verifyCode:hover {
      background: var(--blue-hover);
    }
    /* Secondary verification actions */
    button.sendNewCode,
    button.changeClaims {
      border: 1px solid var(--navy);
      background: var(--surface);
      color: var(--navy);
    }
    button.sendNewCode:hover,
    button.changeClaims:hover {
      background: #f3f6f9;
    }

    /* Continue / Cancel — stacked full-width */
    #attributeVerification > .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }

    /* Verifying modal overlay */
    .verifying-modal {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #verifying_blurb {
      font-size: 14px;
      color: var(--text);
    }

  <script>
    /*
  Show / hide password toggle — shared across B2C pages.
  Injected into each template's <head> via the TOGGLE_SCRIPT token.

  Azure AD B2C requires custom scripts to live in <head> (scripts in <body>
  are stripped from selfasserted 2.1.21 / unifiedssp 2.1.10 onwards) and only
  survive when JavaScript is enabled on the page layout. Because B2C injects
  the form into #api *after* the page is parsed, a MutationObserver attaches
  the toggle when any password field appears (sign-in, reset new-password, etc).
*/
(function () {
  var EYE =
    '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M7.99984 3.3335C3.94975 3.3335 0.666504 8.00016 0.666504 8.00016C0.666504 8.00016 3.94975 12.6668 7.99984 12.6668C12.0499 12.6668 15.3332 8.00016 15.3332 8.00016C15.3332 8.00016 12.0499 3.3335 7.99984 3.3335ZM7.99984 10.6668C6.52706 10.6668 5.33317 9.4729 5.33317 8.00016C5.33317 6.52738 6.52706 5.3335 7.99984 5.3335C9.47262 5.3335 10.6665 6.52738 10.6665 8.00016C10.6665 9.4729 9.47262 10.6668 7.99984 10.6668ZM9.33317 8.00016C9.33317 8.73653 8.73621 9.3335 7.99984 9.3335C7.26347 9.3335 6.6665 8.73653 6.6665 8.00016C6.6665 7.26375 7.26347 6.66683 7.99984 6.66683C8.73621 6.66683 9.33317 7.26375 9.33317 8.00016Z" fill="currentColor"/></svg>';
  var EYE_OFF =
    '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M7.99984 3.3335C3.94975 3.3335 0.666504 8.00016 0.666504 8.00016C0.666504 8.00016 3.94975 12.6668 7.99984 12.6668C12.0499 12.6668 15.3332 8.00016 15.3332 8.00016C15.3332 8.00016 12.0499 3.3335 7.99984 3.3335ZM7.99984 10.6668C6.52706 10.6668 5.33317 9.4729 5.33317 8.00016C5.33317 6.52738 6.52706 5.3335 7.99984 5.3335C9.47262 5.3335 10.6665 6.52738 10.6665 8.00016C10.6665 9.4729 9.47262 10.6668 7.99984 10.6668ZM9.33317 8.00016C9.33317 8.73653 8.73621 9.3335 7.99984 9.3335C7.26347 9.3335 6.6665 8.73653 6.6665 8.00016C6.6665 7.26375 7.26347 6.66683 7.99984 6.66683C8.73621 6.66683 9.33317 7.26375 9.33317 8.00016Z" fill="currentColor"/><path d="M2.4 2.4 L13.6 13.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';

  function makePwdToggler(pwd) {
    if (pwd.getAttribute('data-dfds-toggle') === '1') {
      return;
    }
    pwd.setAttribute('data-dfds-toggle', '1');

    // Remove the no-JS background eye now that a real button takes over.
    pwd.style.backgroundImage = 'none';

    // Wrap the input so the button can be positioned over it.
    var wrap = document.createElement('div');
    wrap.className = 'dfds-pwd-wrap';
    pwd.parentNode.insertBefore(wrap, pwd);
    wrap.appendChild(pwd);

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'dfds-pwd-toggle';
    btn.setAttribute('aria-label', 'Show password');
    btn.setAttribute('aria-pressed', 'false');
    btn.innerHTML = EYE;
    wrap.appendChild(btn);

    btn.addEventListener('click', function () {
      var reveal = pwd.type === 'password';
      pwd.type = reveal ? 'text' : 'password';
      btn.setAttribute('aria-pressed', reveal ? 'true' : 'false');
      btn.setAttribute('aria-label', reveal ? 'Hide password' : 'Show password');
      btn.innerHTML = reveal ? EYE_OFF : EYE;
    });
  }

  function scan() {
    var pwds = document.querySelectorAll('input[type=password]');
    for (var i = 0; i < pwds.length; i++) {
      makePwdToggler(pwds[i]);
    }
  }

  function start() {
    scan();
    // B2C builds the form client-side, so watch for it being injected.
    if (typeof MutationObserver !== 'undefined') {
      new MutationObserver(scan).observe(document.documentElement, {
        childList: true,
        subtree: true
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();

  </script>
</head>
<body>
  <div class="dfds-wrapper">
    <div class="dfds-left">
      <div class="dfds-logo" role="img" aria-label="DFDS"></div>

      <!-- Azure AD B2C injects the page content into this container -->
      <div id="api"></div>
    </div>

    <div class="dfds-right" aria-hidden="true"></div>
  </div>
</body>
</html>
